[build]
  command = "npm install && if [ \"$PEP_SITE\" = \"true\" ]; then printf '/ /pep-upload.html 200\\n/* /pep-upload.html 200\\n' > _redirects; fi"
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  included_files = ["node_modules/**"]

[[headers]]
  for = "/*"
  [headers.values]
  X-Frame-Options = "DENY"
  X-Content-Type-Options = "nosniff"
  Referrer-Policy = "strict-origin-when-cross-origin"
  Cache-Control = "public, max-age=0, must-revalidate"
  Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' /.netlify/functions/* https://script.google.com https://script.googleusercontent.com"

# Upload handler API route
[[redirects]]
  from = "/api/upload"
  to = "/.netlify/functions/upload-handler"
  status = 200

# Root serves upload portal
[[redirects]]
  from = "/"
  to = "/upload.html"
  status = 200

# /upload also serves upload portal
[[redirects]]
  from = "/upload"
  to = "/upload.html"
  status = 200

# PEP upload portal
[[redirects]]
  from = "/pep"
  to = "/pep-upload.html"
  status = 200

[[redirects]]
  from = "/pep-upload"
  to = "/pep-upload.html"
  status = 200

# All other paths → standard upload portal
[[redirects]]
  from = "/*"
  to = "/upload.html"
  status = 200
