<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Planetarium – Sonnensystem</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <header>
    <div class="header-left">
      <span class="logo">&#127756;</span>
      <h1>Planetarium</h1>
    </div>
    <div class="controls">
      <div class="control-group">
        <label for="datetime">Datum &amp; Zeit</label>
        <input type="datetime-local" id="datetime"/>
        <button id="btn-now" title="Aktuelle Zeit">Jetzt</button>
      </div>
      <div class="control-group">
        <label for="lat">Breitengrad</label>
        <input type="number" id="lat" value="48.137" step="0.001" min="-90" max="90"/>
        <label for="lon">Längengrad</label>
        <input type="number" id="lon" value="11.576" step="0.001" min="-180" max="180"/>
        <button id="btn-location" title="GPS-Standort verwenden">&#128205; Standort</button>
      </div>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-view="solar">&#9728;&#65039; Sonnensystem</button>
    <button class="tab" data-view="sky">&#127756; Himmelskarte</button>
  </nav>

  <div class="view-container">
    <section id="view-solar" class="view active">
      <canvas id="solar-canvas"></canvas>
      <div class="zoom-controls">
        <button id="zoom-in">+</button>
        <button id="zoom-reset">&#8634;</button>
        <button id="zoom-out">−</button>
      </div>
      <div class="view-hint">Scrollen zum Zoomen &middot; Ziehen zum Verschieben &middot; Klicken für Details</div>
    </section>
    <section id="view-sky" class="view">
      <canvas id="sky-canvas"></canvas>
      <div class="view-hint">Klicken für Details &middot; Zeigt sichtbare Objekte von Ihrem Standort</div>
    </section>
  </div>

  <!-- Info panel (slides in from right) -->
  <aside id="info-panel" class="hidden">
    <button id="info-close">&#10005;</button>
    <div id="info-content"></div>
  </aside>

  <!-- Legend -->
  <div id="legend">
    <div class="legend-title">Legende</div>
    <div class="legend-items" id="legend-items"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
