[build]
  publish = "."
  functions = "netlify/functions"
  command = "npm install"

[[headers]]
  for = "/*"
  [headers.values]
  Cache-Control = "public, max-age=0, must-revalidate"

# Daily import: scrape worldgovernmentbonds.com and write to Netlify Blobs.
# Runs at 06:00 UTC every day.
[functions.fetch-bonds]
  schedule = "15 20 * * *"

# API → Netlify Functions (must come BEFORE the SPA catch-all)
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200
  force  = true

# SPA fallback
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
