[build]
  publish = "."
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
  Cache-Control = "public, max-age=0, must-revalidate"

# Route /api/* to Netlify Functions (must be before SPA fallback)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA fallback — serves index.html for unknown paths
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
