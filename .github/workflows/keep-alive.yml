name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 6 */3 * *'
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase to prevent pausing
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -L \
            "https://faqvdjuhuitfvejzysqp.supabase.co")
          echo "Response code: $RESPONSE"
          if [ "$RESPONSE" -eq 000 ]; then
            echo "❌ Could not connect"
            exit 1
          else
            echo "✅ Keep-alive successful (status $RESPONSE)"
          fi
