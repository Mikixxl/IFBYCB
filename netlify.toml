[build]
  publish = "."
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
  Cache-Control = "public, max-age=0, must-revalidate"

# API → Netlify Functions (must come BEFORE the SPA catch-all)
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200
  force  = true

# SPA fallback (catches all other routes)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
