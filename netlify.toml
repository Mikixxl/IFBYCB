[build]
  command = "npm install"
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  included_files = ["node_modules/**"]

[[headers]]
  for = "/*"
  [headers.values]
  Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/upload.html"
  [headers.values]
  X-Frame-Options = "DENY"
  X-Content-Type-Options = "nosniff"
  Referrer-Policy = "strict-origin-when-cross-origin"
  Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' /.netlify/functions/*"

# Upload handler API route
[[redirects]]
  from = "/api/upload"
  to = "/.netlify/functions/upload-handler"
  status = 200

# Root redirects to upload portal
[[redirects]]
  from = "/"
  to = "/upload.html"
  status = 200

# Serve upload page at /upload
[[redirects]]
  from = "/upload"
  to = "/upload.html"
  status = 200

# Fallback
[[redirects]]
  from = "/*"
  to = "/upload.html"
  status = 200
