[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-XSS-Protection          = "1; mode=block"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy   = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://caldav.icloud.com; img-src 'self' data: https:; font-src 'self';"
    Cache-Control             = "public, max-age=0, must-revalidate"

# Cache static assets longer
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Netlify Functions config
[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@supabase/supabase-js", "node-fetch", "cheerio"]

# Keep Supabase free-tier alive (pings every 5 days)
[functions."supabase-keepalive"]
  schedule = "0 8 */5 * *"
