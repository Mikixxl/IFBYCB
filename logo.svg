<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37"/>
      <stop offset="50%" style="stop-color:#c9a84c"/>
      <stop offset="100%" style="stop-color:#b8941f"/>
    </linearGradient>
  </defs>
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="#1a2744" stroke-width="4"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="url(#goldGrad)" stroke-width="2"/>
  <!-- Inner circle -->
  <circle cx="100" cy="100" r="62" fill="none" stroke="url(#goldGrad)" stroke-width="1.5"/>
  <!-- Curved text top: INTERNATIONAL FINANCE BANK -->
  <path id="topArc" d="M 30,100 a 70,70 0 1,1 140,0" fill="none"/>
  <text font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a2744" font-weight="600" letter-spacing="2.5">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">INTERNATIONAL FINANCE BANK</textPath>
  </text>
  <!-- Curved text bottom: LTD -->
  <path id="bottomArc" d="M 35,108 a 68,68 0 0,0 130,0" fill="none"/>
  <text font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#1a2744" font-weight="600" letter-spacing="4">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">LTD</textPath>
  </text>
  <!-- Decorative dots -->
  <circle cx="38" cy="108" r="2.5" fill="url(#goldGrad)"/>
  <circle cx="162" cy="108" r="2.5" fill="url(#goldGrad)"/>
  <!-- Center IFB text -->
  <text x="100" y="108" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="48" font-weight="bold" fill="url(#goldGrad)" letter-spacing="4">IFB</text>
  <!-- Decorative lines -->
  <line x1="55" y1="120" x2="145" y2="120" stroke="url(#goldGrad)" stroke-width="1"/>
  <line x1="55" y1="82" x2="145" y2="82" stroke="url(#goldGrad)" stroke-width="1"/>
</svg>