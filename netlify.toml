[build]
  publish   = "."
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Route /api/analyze → Netlify function (must come before catch-all)
[[redirects]]
  from   = "/api/analyze"
  to     = "/.netlify/functions/analyze"
  status = 200

# SPA fallback — all unknown paths serve index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
